<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow illustration</title>
  <desc id="desc">Premium blue and white business AI workflow illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eaf8ff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#133A63"/><stop offset=".55" stop-color="#2F80ED"/><stop offset="1" stop-color="#3DD5F3"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#101828" flood-opacity=".14"/></filter>
  </defs>
  <rect width="1200" height="900" rx="56" fill="url(#bg)"/>
  <circle cx="820" cy="250" r="260" fill="#3DD5F3" opacity=".12"/>
  <circle cx="520" cy="460" r="180" fill="none" stroke="#133A63" stroke-opacity=".12" stroke-width="3"/>
  <circle cx="520" cy="460" r="280" fill="none" stroke="#2F80ED" stroke-opacity=".14" stroke-width="3"/>
  <path d="M210 420 C350 280 610 270 760 420 S980 610 1060 430" fill="none" stroke="#2F80ED" stroke-opacity=".28" stroke-width="5"/>
  <g filter="url(#shadow)">
    <rect x="420" y="360" width="210" height="210" rx="52" fill="url(#blue)"/>
    <text x="525" y="452" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">AI</text>
    <text x="525" y="496" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Workflow</text>
  </g>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="120" y="180" width="260" height="138" rx="28" fill="#fff"/>
    <text x="150" y="232" fill="#2F80ED" font-size="17" font-weight="800" letter-spacing="3">BUSINESS</text>
    <text x="150" y="274" fill="#101828" font-size="24" font-weight="800">現場課題を整理</text>
    <rect x="820" y="210" width="260" height="138" rx="28" fill="#fff"/>
    <text x="850" y="262" fill="#2F80ED" font-size="17" font-weight="800" letter-spacing="3">SYSTEM</text>
    <text x="850" y="304" fill="#101828" font-size="24" font-weight="800">業務システム連携</text>
    <rect x="155" y="610" width="270" height="138" rx="28" fill="#fff"/>
    <text x="185" y="662" fill="#2F80ED" font-size="17" font-weight="800" letter-spacing="3">PEOPLE</text>
    <text x="185" y="704" fill="#101828" font-size="24" font-weight="800">社員教育と定着</text>
    <rect x="780" y="620" width="300" height="138" rx="28" fill="#fff"/>
    <text x="810" y="672" fill="#2F80ED" font-size="17" font-weight="800" letter-spacing="3">AUTOMATION</text>
    <text x="810" y="714" fill="#101828" font-size="24" font-weight="800">改善サイクルを自動化</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="patent-title patent-desc">
  <title id="patent-title">Patent</title>
  <desc id="patent-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="patent-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="patent-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="patent-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="patent-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="patent-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#patent-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#patent-grid)" opacity=".45"/>

  <g filter="url(#patent-shadow)">
    <rect x="112" y="118" width="300" height="250" rx="28" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#patent-soft)"/>
    <path d="M184 286h184M184 316h184M198 286v30M354 286v30" stroke="#2F80ED" stroke-width="4" stroke-linecap="round"/>
    <path d="M208 238l108-62 78 46-112 64z" fill="#CDE4FB" stroke="#0B2D57" stroke-width="4"/>
    <path d="M208 238v78l74 42v-72zM394 222v80l-112 56v-72z" fill="#B7D8F4" stroke="#0B2D57" stroke-width="4"/>

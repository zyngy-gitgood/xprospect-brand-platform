    <path d="M412 234L472 184" stroke="#34D4F4" stroke-width="3" stroke-linecap="round"/><text x="466" y="318" font-family="Noto Sans JP, Manrope, sans-serif" font-size="18" font-weight="800" fill="#0F172A">自動計測</text><text x="466" y="346" font-family="Manrope, Inter, sans-serif" font-size="13" font-weight="700" fill="#5C6B80">Patent No. 7288568</text>

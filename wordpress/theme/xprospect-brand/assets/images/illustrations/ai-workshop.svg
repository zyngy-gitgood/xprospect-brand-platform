<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="ai-workshop-title ai-workshop-desc">
  <title id="ai-workshop-title">Ai Workshop</title>
  <desc id="ai-workshop-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="ai-workshop-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="ai-workshop-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="ai-workshop-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="ai-workshop-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="ai-workshop-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#ai-workshop-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#ai-workshop-grid)" opacity=".45"/>

  <g filter="url(#ai-workshop-shadow)">
    <rect x="110" y="126" width="540" height="268" rx="30" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#ai-workshop-soft)"/>
    <rect x="286" y="94" width="188" height="58" rx="29" fill="#0B2D57"/><text x="380.0" y="130.0" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">AI PLAN</text>
    <path d="M200 260L560 260" stroke="#34D4F4" stroke-width="4" stroke-linecap="round"/>
    <circle cx="220" cy="222" r="30" fill="#0B2D57"/><path d="M168 348c8-54 96-54 104 0" fill="#2F80ED"/>
    <circle cx="380" cy="206" r="34" fill="#0B2D57"/><path d="M308 348c10-72 134-72 144 0" fill="#2F80ED"/>
    <circle cx="540" cy="222" r="30" fill="#0B2D57"/><path d="M488 348c8-54 96-54 104 0" fill="#2F80ED"/>
    <rect x="166" y="150" width="132" height="54" rx="18" fill="#FFFFFF" stroke="#DDE8F5"/><text x="191" y="184" font-family="Noto Sans JP, Manrope, sans-serif" font-size="16" font-weight="800" fill="#0F172A">課題整理</text>
    <rect x="462" y="150" width="132" height="54" rx="18" fill="#FFFFFF" stroke="#DDE8F5"/><text x="487" y="184" font-family="Noto Sans JP, Manrope, sans-serif" font-size="16" font-weight="800" fill="#0F172A">定着支援</text>
  </g>

</svg>

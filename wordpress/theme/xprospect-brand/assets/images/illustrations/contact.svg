<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="contact-title contact-desc">
  <title id="contact-title">Contact</title>
  <desc id="contact-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="contact-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="contact-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="contact-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="contact-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="contact-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#contact-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#contact-grid)" opacity=".45"/>

  <g filter="url(#contact-shadow)">
    <rect x="132" y="128" width="496" height="252" rx="30" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#contact-soft)"/>
    <rect x="288" y="112" width="184" height="56" rx="28" fill="#0B2D57"/><text x="380.0" y="147.0" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">CONTACT</text>
    <rect x="172" y="204" width="172" height="86" rx="20" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#contact-soft)"/><text x="220" y="255" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">課題</text>
    <rect x="416" y="204" width="172" height="86" rx="20" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#contact-soft)"/><text x="464" y="255" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">提案</text>
    <path d="M344 247L416 247" stroke="#34D4F4" stroke-width="5" stroke-linecap="round"/>
    <circle cx="258" cy="326" r="24" fill="#2F80ED"/><circle cx="502" cy="326" r="24" fill="#0B2D57"/>
    <text x="306" y="342" font-family="Noto Sans JP, Manrope, sans-serif" font-size="20" font-weight="800" fill="#0F172A">無料相談</text>
  </g>

</svg>

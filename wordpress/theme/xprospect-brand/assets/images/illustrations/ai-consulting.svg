<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="ai-consulting-title ai-consulting-desc">
  <title id="ai-consulting-title">Ai Consulting</title>
  <desc id="ai-consulting-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="ai-consulting-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="ai-consulting-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="ai-consulting-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="ai-consulting-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="ai-consulting-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#ai-consulting-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#ai-consulting-grid)" opacity=".45"/>

  <g filter="url(#ai-consulting-shadow)">
    <rect x="118" y="100" width="255" height="310" rx="28" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#ai-consulting-soft)"/>
    <text x="150" y="148" font-family="Noto Sans JP, Manrope, sans-serif" font-size="22" font-weight="800" fill="#0F172A">AI導入診断</text><text x="150" y="178" font-family="Manrope, Inter, sans-serif" font-size="13" font-weight="700" fill="#5C6B80">Business analysis</text>
    <rect x="150" y="218" width="170" height="14" rx="7" fill="#CFE0F5"/><rect x="150" y="252" width="132" height="14" rx="7" fill="#E4ECF7"/><rect x="150" y="286" width="190" height="14" rx="7" fill="#E4ECF7"/>
    <rect x="150" y="330" width="74" height="74" rx="20" fill="url(#ai-consulting-blue)"/><path d="M174 367h26m-13-13v26" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    <rect x="410" y="144" width="230" height="226" rx="28" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#ai-consulting-soft)"/>
    <path d="M456 298c34-78 98-78 132 0" fill="none" stroke="#2F80ED" stroke-width="8" stroke-linecap="round"/>
    <circle cx="456" cy="298" r="13" fill="#34D4F4"/><circle cx="588" cy="298" r="13" fill="#0B2D57"/>
    <text x="522" y="232" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="36" font-weight="900" fill="#0B2D57">AI</text>
    <text x="464" y="336" font-family="Noto Sans JP, Manrope, sans-serif" font-size="16" font-weight="800" fill="#0F172A">優先順位を可視化</text>
  </g>

</svg>

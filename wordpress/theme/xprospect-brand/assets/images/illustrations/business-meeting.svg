<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="business-meeting-title business-meeting-desc">
  <title id="business-meeting-title">Business Meeting</title>
  <desc id="business-meeting-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="business-meeting-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="business-meeting-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="business-meeting-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="business-meeting-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="business-meeting-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#business-meeting-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#business-meeting-grid)" opacity=".45"/>

  <g filter="url(#business-meeting-shadow)">
    <rect x="120" y="118" width="520" height="250" rx="30" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#business-meeting-soft)"/>
    <rect x="300" y="102" width="160" height="56" rx="28" fill="#0B2D57"/><text x="380.0" y="137.0" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">CONSULT</text>
    <circle cx="245" cy="242" r="36" fill="#0B2D57"/><path d="M180 348c9-70 122-70 132 0" fill="#2F80ED"/>
    <circle cx="515" cy="242" r="36" fill="#0B2D57"/><path d="M450 348c9-70 122-70 132 0" fill="#2F80ED"/>
    <path d="M318 270L442 270" stroke="#34D4F4" stroke-width="5" stroke-linecap="round"/>
    <rect x="300" y="178" width="160" height="52" rx="18" fill="#FFFFFF" stroke="#DDE8F5"/><text x="336" y="211" font-family="Noto Sans JP, Manrope, sans-serif" font-size="16" font-weight="800" fill="#0F172A">課題整理</text>
  </g>

</svg>

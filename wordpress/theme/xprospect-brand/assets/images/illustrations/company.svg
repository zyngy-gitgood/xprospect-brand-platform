<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="company-title company-desc">
  <title id="company-title">Company</title>
  <desc id="company-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="company-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="company-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="company-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="company-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="company-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#company-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#company-grid)" opacity=".45"/>

  <g filter="url(#company-shadow)">
    <rect x="116" y="118" width="528" height="258" rx="30" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#company-soft)"/>
    <path d="M184 312V190h92v122M314 312V154h132v158M484 312V214h92v98" fill="#E7F1FE" stroke="#0B2D57" stroke-width="4" stroke-linejoin="round"/>
    <rect x="340" y="188" width="22" height="22" rx="4" fill="#2F80ED"/><rect x="398" y="188" width="22" height="22" rx="4" fill="#34D4F4"/><rect x="340" y="238" width="22" height="22" rx="4" fill="#2F80ED"/><rect x="398" y="238" width="22" height="22" rx="4" fill="#34D4F4"/>
    <path d="M156 312L608 312" stroke="#34D4F4" stroke-width="5" stroke-linecap="round"/><text x="292" y="354" font-family="Noto Sans JP, Manrope, sans-serif" font-size="18" font-weight="800" fill="#0F172A">AI実装パートナー</text>
  </g>


<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="top-hero-title top-hero-desc">
  <title id="top-hero-title">Top Hero</title>
  <desc id="top-hero-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="top-hero-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="top-hero-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="top-hero-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="top-hero-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="top-hero-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#top-hero-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#top-hero-grid)" opacity=".45"/>

  <g filter="url(#top-hero-shadow)">
    <rect x="120" y="130" width="520" height="250" rx="30" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#top-hero-soft)"/>
    <rect x="306" y="108" width="148" height="54" rx="27" fill="#0B2D57"/><text x="380.0" y="142.0" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">AI CORE</text>
    <path d="M218 218L330 238" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/><path d="M442 238L550 218" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/><path d="M380 162L380 306" stroke="#34D4F4" stroke-width="4" stroke-linecap="round"/>
    <rect x="152" y="176" width="150" height="88" rx="18" fill="#FFFFFF" stroke="#DDE8F5"/><text x="178" y="214" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">業務データ</text><text x="178" y="240" font-family="Manrope, Inter, sans-serif" font-size="12" font-weight="700" fill="#5C6B80">Mail / Docs</text>
    <rect x="458" y="176" width="150" height="88" rx="18" fill="#FFFFFF" stroke="#DDE8F5"/><text x="486" y="214" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">現場判断</text><text x="486" y="240" font-family="Manrope, Inter, sans-serif" font-size="12" font-weight="700" fill="#5C6B80">Workflow</text>
    <circle cx="380" cy="256" r="72" fill="url(#top-hero-blue)"/>
    <text x="380" y="262" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="34" font-weight="900" fill="#fff">AI</text>
    <rect x="255" y="316" width="250" height="70" rx="18" fill="#FFFFFF" stroke="#DDE8F5"/><text x="292" y="356" font-family="Noto Sans JP, Manrope, sans-serif" font-size="18" font-weight="800" fill="#0F172A">成果に変える運用設計</text>
  </g>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="services-title services-desc">
  <title id="services-title">Services</title>
  <desc id="services-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="services-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="services-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="services-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B2D57" flood-opacity=".12"/>
    </filter>
    <filter id="services-soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2D57" flood-opacity=".08"/>
    </filter>
    <pattern id="services-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#services-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#services-grid)" opacity=".45"/>

  <g filter="url(#services-shadow)">
    <circle cx="380" cy="250" r="88" fill="url(#services-blue)"/>
    <text x="380" y="242" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="34" font-weight="900" fill="#fff">X</text>
    <text x="380" y="278" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="15" font-weight="800" fill="#fff">実行支援</text>
    <path d="M282 162L326 205" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/><path d="M478 162L434 205" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/><path d="M282 338L326 295" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/><path d="M478 338L434 295" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/>
    <rect x="104" y="112" width="178" height="92" rx="22" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#services-soft)"/><text x="157" y="166" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">AI導入</text>
    <rect x="478" y="112" width="178" height="92" rx="22" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#services-soft)"/><text x="520" y="166" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">システム開発</text>
    <rect x="104" y="316" width="178" height="92" rx="22" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#services-soft)"/><text x="163" y="370" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">DX基盤</text>
    <rect x="478" y="316" width="178" height="92" rx="22" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#services-soft)"/><text x="529" y="370" font-family="Noto Sans JP, Manrope, sans-serif" font-size="17" font-weight="800" fill="#0F172A">人材育成</text>
  </g>

</svg>

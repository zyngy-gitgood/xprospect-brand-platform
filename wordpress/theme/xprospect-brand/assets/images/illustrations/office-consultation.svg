    <text x="142" y="160" font-family="Noto Sans JP, Manrope, sans-serif" font-size="22" font-weight="800" fill="#0F172A">相談内容</text><rect x="142" y="202" width="164" height="12" rx="6" fill="#CFE0F5"/><rect x="142" y="234" width="126" height="12" rx="6" fill="#E4ECF7"/><rect x="142" y="266" width="188" height="12" rx="6" fill="#E4ECF7"/>
    <rect x="418" y="152" width="220" height="196" rx="28" fill="#FFFFFF" stroke="#DDE8F5" filter="url(#office-consultation-soft)"/>
    <path d="M462 286c34-74 98-74 132 0" fill="none" stroke="#2F80ED" stroke-width="8" stroke-linecap="round"/>
    <circle cx="462" cy="286" r="13" fill="#34D4F4"/><circle cx="594" cy="286" r="13" fill="#0B2D57"/>
    <text x="528" y="228" text-anchor="middle" font-family="Manrope, Inter, sans-serif" font-size="34" font-weight="900" fill="#0B2D57">AI</text>
    <text x="456" y="324" font-family="Noto Sans JP, Manrope, sans-serif" font-size="16" font-weight="800" fill="#0F172A">活用可能性を整理</text>

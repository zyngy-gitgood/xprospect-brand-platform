<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="office-consultation-title office-consultation-desc">
  <title id="office-consultation-title">Office Consultation</title>
  <desc id="office-consultation-desc">X-PROSPECT premium vector illustration</desc>
  <defs>
    <linearGradient id="office-consultation-blue" x1="96" y1="70" x2="660" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2D57"/>
      <stop offset=".58" stop-color="#1F6FE5"/>
      <stop offset="1" stop-color="#34D4F4"/>
    </linearGradient>
    <linearGradient id="office-consultation-surface" x1="80" y1="48" x2="680" y2="472" gradientUnits="userSpaceOnUse">

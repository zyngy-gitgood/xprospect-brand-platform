      <path d="M32 0H0v32" fill="none" stroke="#D7E5F5" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="760" height="520" rx="40" fill="#F7FAFE"/>
  <circle cx="620" cy="120" r="106" fill="#78E0F2" opacity=".16"/>
  <circle cx="130" cy="430" r="150" fill="#2F80ED" opacity=".06"/>
  <rect x="44" y="40" width="672" height="440" rx="36" fill="url(#office-consultation-surface)" stroke="#DDE8F5"/>
  <rect x="76" y="72" width="608" height="376" rx="28" fill="url(#office-consultation-grid)" opacity=".45"/>

  <g filter="url(#office-consultation-shadow)">

<!-- wp:html -->
<main id="main" class="xprospect-static-page">
	<section class="xprospect-page-hero" aria-labelledby="page-title">
		<div class="xprospect-page-hero__inner">
			<p class="xprospect-page-hero__eyebrow">Contact</p>
			<h1 id="page-title">お問い合わせ</h1>
			<p>AI導入やシステム開発について、まだ具体的な要件がなくてもご相談ください。</p>
		</div>
	</section>

	<section class="xprospect-page-content-placeholder" aria-labelledby="contact-form-title">
		<div class="xprospect-page-content-placeholder__inner">
			<h2 id="contact-form-title">Contact form placeholder</h2>
			<form class="xprospect-contact-form" aria-label="お問い合わせフォーム">
				<label>
					<span>お名前</span>
					<input type="text" name="your-name" autocomplete="name">
				</label>
				<label>
					<span>会社名</span>
					<input type="text" name="company" autocomplete="organization">
				</label>
				<label>
					<span>メールアドレス</span>
					<input type="email" name="email" autocomplete="email">
				</label>
				<label>
					<span>電話番号</span>
					<input type="tel" name="tel" autocomplete="tel">
				</label>
				<label class="xprospect-contact-form__wide">
					<span>ご相談内容</span>
					<textarea name="message" rows="7"></textarea>
				</label>
				<button class="xprospect-button xprospect-button--primary" type="button">送信する</button>
			</form>
		</div>
	</section>

	<section class="xprospect-page-cta" aria-labelledby="page-cta-title">
		<div class="xprospect-contact-cta">
			<h2 id="page-cta-title">まだ具体的でなくても大丈夫です。まずは課題をお聞かせください。</h2>
			<a class="xprospect-button xprospect-button--primary" href="/ai/">AI導入支援を見る</a>
		</div>
	</section>
</main>
